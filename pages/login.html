<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cakeology</title>
    <meta name="description" content="Access your Cakeology account to track orders, manage subscriptions, and save your favorite designs.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-sweet);
            padding: 80px 20px;
        }

        .login-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-premium);
        }

        .login-info {
            flex: 1;
            background: var(--primary-pink);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .login-form-side {
            flex: 1.2;
            padding: 60px;
        }

        .auth-toggle {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .auth-tab {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
        }

        .auth-tab.active {
            color: var(--text-chocolate);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 30px;
            height: 3px;
            background: var(--accent-gold);
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--primary-pink);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .social-btn:hover {
            background: var(--primary-cream);
        }

        .divider {
            text-align: center;
            position: relative;
            margin: 20px 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--primary-pink);
        }

        .divider span {
            background: var(--bg-surface);
            padding: 0 15px;
            position: relative;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .login-form-side .logo {
            display: none !important;
        }

        @media (max-width: 768px) {
            .login-form-side .logo {
                display: inline-block !important;
                margin-bottom: 20px;
            }
            .login-container {
                flex-direction: column;
            }
            .login-info {
                display: none;
            }
            .login-form-side {
                padding: 40px 20px;
            }
        }
    </style>
    <!-- Favicon & Touch Icons -->
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="icon" type="image/png" sizes="256x256" href="../images/favicon.png">
    <link rel="apple-touch-icon" sizes="256x256" href="../images/apple-touch-icon.png">
    <meta name="theme-color" content="#D4AF37">
</head>

<body>

    <section class="login-section">
        <div class="login-container">
            <div class="login-info">
                <a href="../index.html" class="logo-wrapper" style="margin-bottom: 40px; justify-content: center;">
                    <div class="logo-icon">
                        <i class="fa-solid fa-cake-candles"></i>
                    </div>
                    <span class="logo-text" style="color: white;">Cakeology</span>
                </a>
                <h2 style="font-size: 2.5rem; margin-bottom: 20px; color: white;">Welcome Back!</h2>
                <p style="margin-bottom: 30px; color: rgba(255,255,255,0.9);">Login to access your personalized dashboard, track your orders, and manage your sweet rewards.</p>
                <img src="../images/hero.png" alt="Cake" style="border-radius: var(--radius-md); box-shadow: var(--shadow-soft);">
            </div>
            
            <div class="login-form-side">
                <a href="../index.html" class="logo-wrapper" style="margin-bottom: 30px;">
                    <div class="logo-icon">
                        <i class="fa-solid fa-cake-candles"></i>
                    </div>
                    <span class="logo-text">Cakeology</span>
                </a>
                <div class="auth-toggle">
                    <div class="auth-tab active">Login</div>
                    <div class="auth-tab">Sign Up</div>
                </div>

                <div class="social-login">
                    <div class="social-btn"><i class="fab fa-google" style="color: #DB4437;"></i> Google</div>
                    <div class="social-btn"><i class="fab fa-facebook-f" style="color: #4267B2;"></i> Facebook</div>
                </div>

                <div class="divider">
                    <span>or use email</span>
                </div>

                <form action="dashboard.html">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email Address</label>
                        <input type="email" placeholder="example@mail.com" style="width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--primary-pink); outline: none;" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px; position: relative;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
                        <input type="password" id="password-field" placeholder="••••••••" style="width: 100%; padding: 12px 45px 12px 20px; border-radius: 12px; border: 1px solid var(--primary-pink); outline: none;" required>
                        <i class="far fa-eye" id="toggle-password" style="position: absolute; right: 15px; top: 44px; cursor: pointer; color: var(--text-muted); font-size: 1rem;"></i>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: 400; cursor: pointer; font-size: 0.9rem;">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" id="forgot-password" style="color: var(--accent-gold); font-size: 0.9rem; font-weight: 500;">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 12px;">Sign In</button>
                </form>

                <p style="text-align: center; margin-top: 30px; color: var(--text-muted);">
                    Don't have an account? <a href="#" style="color: var(--accent-gold); font-weight: 600;">Create Account</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Toast for Forgot Password -->
    <div id="auth-toast" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 25px; border-radius: 50px; font-size: 0.9rem; transition: 0.5s; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
        <i class="fas fa-info-circle" style="color: var(--accent-gold); margin-right: 10px;"></i>
        <span id="toast-message">Reset link sent to your email!</span>
    </div>

    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#toggle-password');
        const passwordField = document.querySelector('#password-field');

        togglePassword.addEventListener('click', function() {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Forgot Password Logic (Mock)
        const forgotPassword = document.querySelector('#forgot-password');
        const toast = document.querySelector('#auth-toast');

        forgotPassword.addEventListener('click', function(e) {
            e.preventDefault();
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => {
                toast.style.transform = 'translateX(-50%) translateY(100px)';
            }, 3000);
        });
    </script>

</body>

</html>
