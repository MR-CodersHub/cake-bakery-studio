<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Cakeology</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon & Touch Icons -->
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="icon" type="image/png" sizes="256x256" href="../images/favicon.png">
    <link rel="apple-touch-icon" sizes="256x256" href="../images/apple-touch-icon.png">
    <meta name="theme-color" content="#D4AF37">
</head>
<body>
    <div class="dash-container"><div class="sidebar-overlay" id="dash-overlay"></div>
        <aside class="dash-sidebar" id="dash-sidebar">
            <div class="dash-sidebar-header"><a href="../index.html" class="logo" style="font-size: 1.4rem;">Cakeology</a></div>
            <div class="dash-sidebar-content">
                <div class="dash-nav-label">Shopping</div>
                <a href="dashboard.html" class="dash-nav-link"><i class="fas fa-th-large"></i> Overview</a>
                <a href="my-orders.html" class="dash-nav-link"><i class="fas fa-box"></i> My Orders</a>
                <a href="order-tracking.html" class="dash-nav-link"><i class="fas fa-truck-loading"></i> Track Orders</a>
                <a href="wishlist.html" class="dash-nav-link"><i class="fas fa-heart"></i> Wishlist</a>
                <div class="dash-nav-label">Preferences</div>
                <a href="saved-addresses.html" class="dash-nav-link"><i class="fas fa-map-marker-alt"></i> Saved Addresses</a>
                <a href="payment-methods.html" class="dash-nav-link"><i class="fas fa-credit-card"></i> Payment Methods</a>
                <a href="user-reviews.html" class="dash-nav-link"><i class="fas fa-star"></i> My Reviews</a>
                <div class="dash-nav-label">Personal</div>
                <a href="user-notifications.html" class="dash-nav-link"><i class="fas fa-bell"></i> Notifications</a>
                <a href="user-profile.html" class="dash-nav-link active"><i class="fas fa-user-circle"></i> Profile</a>
                <a href="user-settings.html" class="dash-nav-link"><i class="fas fa-cog"></i> Settings</a>
                <a href="support-center.html" class="dash-nav-link"><i class="fas fa-headset"></i> Support Center</a>
                <a href="login.html" class="dash-nav-link" style="color: var(--dash-danger); margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>
        <main class="dash-main">
            <header class="dash-header"><div style="display: flex; align-items: center; gap: 20px;"><div id="dash-hamburger" style="cursor: pointer; font-size: 1.2rem; display: none;"><i class="fas fa-bars"></i></div><h2>Profile Settings</h2></div></header>
            <div class="dash-content">
                <div style="max-width: 800px; margin: 0 auto;">
                    <div class="dash-card" style="text-align: center; margin-bottom: 30px;">
                        <img src="https://i.pravatar.cc/150?u=sarah" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--dash-primary); padding: 5px; margin-bottom: 20px;">
                        <h2 style="font-family: 'Playfair Display', serif;">Sarah Jenkins</h2>
                        <p style="color: var(--dash-text-muted);">Cakeology Member since Jan 2023</p>
                    </div>
                    <div class="dash-card">
                        <h3 style="margin-bottom: 25px; border-bottom: 1px solid var(--dash-border); padding-bottom: 15px;">Account Details</h3>
                        <form>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                                <div>
                                    <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px;">First Name</label>
                                    <input type="text" value="Sarah" style="width: 100%; border: 1px solid var(--dash-border); border-radius: 10px; padding: 12px;">
                                </div>
                                <div>
                                    <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px;">Last Name</label>
                                    <input type="text" value="Jenkins" style="width: 100%; border: 1px solid var(--dash-border); border-radius: 10px; padding: 12px;">
                                </div>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px;">Email Address</label>
                                <input type="email" value="sarah.jenkins@example.com" style="width: 100%; border: 1px solid var(--dash-border); border-radius: 10px; padding: 12px;">
                            </div>
                            <div style="margin-bottom: 30px;">
                                <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px;">Phone Number</label>
                                <input type="text" value="+1 (555) 982-1234" style="width: 100%; border: 1px solid var(--dash-border); border-radius: 10px; padding: 12px;">
                            </div>
                            <button type="button" class="btn btn-primary" style="padding: 12px 30px; border-radius: 12px;">Update Profile</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/main.js"></script>
</body>
</html>
