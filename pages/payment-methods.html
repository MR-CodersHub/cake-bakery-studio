<body>
    <div class="dash-container"><div class="sidebar-overlay" id="dash-overlay"></div>
        <aside class="dash-sidebar" id="dash-sidebar">
            <div class="dash-sidebar-header"><a href="../index.html" class="logo" style="font-size: 1.4rem;">Cakeology</a></div>
            <div class="dash-sidebar-content">
                <div class="dash-nav-label">Shopping</div>
                <a href="dashboard.html" class="dash-nav-link"><i class="fas fa-th-large"></i> Overview</a>
                <a href="my-orders.html" class="dash-nav-link"><i class="fas fa-box"></i> My Orders</a>
                <a href="order-tracking.html" class="dash-nav-link"><i class="fas fa-truck-loading"></i> Track Orders</a>
                <a href="wishlist.html" class="dash-nav-link"><i class="fas fa-heart"></i> Wishlist</a>
                <div class="dash-nav-label">Preferences</div>
                <a href="saved-addresses.html" class="dash-nav-link"><i class="fas fa-map-marker-alt"></i> Saved Addresses</a>

                <a href="user-reviews.html" class="dash-nav-link"><i class="fas fa-star"></i> My Reviews</a>
            </div>
        </aside>
        <main class="dash-main">
            <header class="dash-header"><div style="display: flex; align-items: center; gap: 20px;"><div id="dash-hamburger" style="cursor: pointer; font-size: 1.2rem; display: none;"><i class="fas fa-bars"></i></div><h2>Wallet & Payments</h2></div></header>
            <div class="dash-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h1 style="font-family: 'Playfair Display', serif;">Payment Methods</h1>
                    <button class="btn btn-primary" style="border-radius: 12px;"><i class="fas fa-plus"></i> Add New Card</button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px;">
                    <div class="dash-card" style="background: linear-gradient(135deg, #1e293b, #334155); color: white; height: 200px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <i class="fab fa-cc-visa" style="font-size: 2.5rem;"></i>
                            <span style="font-size: 0.8rem; opacity: 0.8; font-weight: 600;">PRIMARY</span>
                        </div>
                        <div style="font-size: 1.4rem; letter-spacing: 2px; font-family: monospace;">**** **** **** 4421</div>
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <div>
                                <div style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px;">CARD HOLDER</div>
                                <div style="font-size: 0.9rem; font-weight: 600;">SARAH JENKINS</div>
                            </div>
                            <div>
                                <div style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px;">EXPIRES</div>
                                <div style="font-size: 0.9rem; font-weight: 600;">12/26</div>
                            </div>
                        </div>
                    </div>
                    <div class="dash-card" style="background: linear-gradient(135deg, #4E342E, #6D4C41); color: white; height: 200px; display: flex; flex-direction: column; justify-content: space-between;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <i class="fab fa-cc-mastercard" style="font-size: 2.5rem;"></i>
                        </div>
                        <div style="font-size: 1.4rem; letter-spacing: 2px; font-family: monospace;">**** **** **** 8892</div>
                        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                            <div>
                                <div style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px;">CARD HOLDER</div>
                                <div style="font-size: 0.9rem; font-weight: 600;">SARAH JENKINS</div>
                            </div>
                            <div>
                                <div style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 5px;">EXPIRES</div>
                                <div style="font-size: 0.9rem; font-weight: 600;">08/25</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

    <script src="../js/main.js"></script>
