<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Cakeology</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: var(--gradient-sweet);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 550px;
            background: var(--white);
            padding: 50px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-premium);
            text-align: center;
        }


        .auth-form .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .auth-form .form-group {
            margin-bottom: 20px;
        }

        .auth-form .full {
            grid-column: span 2;
        }

        .auth-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .auth-form input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid var(--primary-pink);
            border-radius: var(--radius-pill);
            outline: none;
            transition: var(--transition-smooth);
        }

        .auth-form input:focus {
            border-color: var(--accent-gold);
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid var(--primary-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-chocolate);
            transition: var(--transition-smooth);
        }

        .social-btn:hover {
            background: var(--primary-pink);
        }

        .divider {
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--primary-pink);
        }

        .divider span {
            background: var(--white);
            padding: 0 10px;
            position: relative;
            z-index: 1;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .auth-form .form-grid {
                grid-template-columns: 1fr;
            }
            .auth-form .full {
                grid-column: span 1;
            }
        }
    </style>
    <!-- Favicon & Touch Icons -->
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="icon" type="image/png" sizes="256x256" href="../images/favicon.png">
    <link rel="apple-touch-icon" sizes="256x256" href="../images/apple-touch-icon.png">
    <meta name="theme-color" content="#D4AF37">
</head>
<body>
    <div class="auth-card reveal">
        <a href="../index.html" class="logo" style="margin-bottom: 30px; display: inline-block;">Cakeology</a>
        <h2 style="margin-bottom: 10px;">Join the Family</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Create an account to start your sweet journey.</p>

        <form class="auth-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="John" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Doe" required>
                </div>
                <div class="form-group full">
                    <label>Email Address</label>
                    <input type="email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <div style="text-align: left; margin: 10px 0 25px;">
                <label style="font-size: 0.9rem; display: flex; align-items: center; gap: 10px; font-weight: 400; cursor: pointer;">
                    <input type="checkbox" style="width: auto;"> I agree to the <a href="#" style="color: var(--accent-gold);">Terms & Conditions</a>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <div class="social-login">
            <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-apple"></i></a>
        </div>

        <p style="font-size: 0.9rem;">Already have an account? <a href="login.html" style="color: var(--accent-gold); font-weight: 600;">Sign In</a></p>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
